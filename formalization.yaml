# formalization.yaml (v0.3): repo-root metadata for an AI-authored formalization project.
# Schema reference: https://github.com/mathlib-initiative/formalization.yaml
# Mirrors aiq-dkps-formalization/formalization.yaml.

version: "v0.3"

project:
  name: "AIQ VeriStressGT formalization: robustness-certificate libraries for the UCLA TA1 thread"
  authors:
    - "AIQ Kitware"
  license: "Apache-2.0"
  repository: "https://github.com/AIQ-Kitware/aiq-veristressgt-formalization (standalone)"
  status_note: >
    PROVED. All theorems compile with zero `sorry` (`lake build` green); axiom-clean
    ({propext, Classical.choice, Quot.sound}) per AxiomAudit.lean / scripts/check.sh.
    Following AUDIT.md and GUIDANCE-F2-F4b.md, the second audit pass CLOSED F4b (the
    whole-network big-M encoding is wired to IBP box validity: ExactMILP/Network.lean —
    advSet, bigMReach_sound/complete, netTrace_mem_netBoxes) and F2 for the LINEAR
    attention construction (SelfAttention/LinearDominanceBlock.lean — the certificate is
    DERIVED from per-token deviations, no assumed Lipschitz constant). For the softmax
    fixed-pattern construction the score-sensitivity (C.1) and the pooling coefficient
    (C.3) are formalized (SelfAttention/FixedPatternBlock.lean); the C.3 anchor records
    the audit finding that the honest leading coefficient is n/2, not the code's n/4 (new
    Family-A edge attn-Lattn-n4-pooling). The softmax Lipschitz consumer (F2-B) is CLOSED and
    UNCONDITIONAL (SoftmaxLipschitz.lean: hasFDerivAt_softmax + lipschitzWith_softmax, ½ tight
    per arXiv:2510.23012), and per AUDIT2.md the fixed-pattern chain is now ASSEMBLED (G1):
    FixedPatternBlock.Z_deviation/Z_deviation_n2 derive ‖ΔZᵢ‖ ≤ (n/2)·B_S·ε·(Vmax+δV)+δV, so
    the softmax construction certifies from construction-level quantities. The full fixed-pattern
    cert (fixedPattern_robust_derived), the Loewner Jacobian forms (G8), and the n/4 RESOLUTION
    followed (AUDIT2.md/AUDIT3.md): the n/4 is a CONFIRMED code-vs-paper bug (paper eq.54 = n/2 =
    machine-checked bound; shipped configs at margin_slack=1.05 are in the exposed regime —
    FINDING-attn-Lattn-n4.md). Remaining items are NON-LEAN: report to UCLA + outside faithfulness
    review. This file records the target structure, the source theorems, and the
    assumption->relaxation edges to the empirical repo (ta1/VeriStressGT). See README.md,
    theorem-map.md, ucla-formalization-edges.md, AUDIT.md/AUDIT2.md/AUDIT3.md, and GUIDANCE-F2-F4b.md.

sources:
  - title: "Stress-Testing Neural Network Verifiers with Provably Robust Instances"
    authors: ["Troxell", "Alexandr", "Hunt", "Lei", "Montúfar"]
    id: "UCLA VeriStressGT (arXiv:2605.17153)"
    type: "research paper"
    role: "The empirical framework being formalized (provably-robust instances + Difficulty Profile)."
  - title: "Robustness Verification of Polynomial Neural Networks"
    authors: ["Alexandr", "Duan", "Montúfar"]
    id: "arXiv:2602.06105"
    type: "research paper"
    role: "Theory behind polynomial.algebraic_boundary; ED-degree exact method (T6)."
  - title: "Lipschitz-Margin Training"
    authors: ["Tsuzuku", "Sato", "Sugiyama"]
    id: "arXiv:1802.04034"
    type: "prior theorem (T1)"
    prior_work: "LipschitzMargin/ — scalar margin certificate."
  - title: "The Lipschitz Constant of Self-Attention"
    authors: ["Kim", "Papamakarios", "Mnih"]
    id: "arXiv:2006.04710"
    type: "prior theorem (T2)"
    prior_work: "SelfAttention/ — L_attn sensitivity; softmax-Jacobian bound in ForMathlib."
  - title: "Evaluating Robustness of Neural Networks with Mixed Integer Programming"
    authors: ["Tjeng", "Xiao", "Tedrake"]
    id: "arXiv:1711.07356"
    type: "prior theorem (T3)"
    prior_work: "ExactMILP/ — big-M encoding faithfulness."
  - title: "On the Effectiveness of Interval Bound Propagation..."
    authors: ["Gowal", "et al."]
    id: "arXiv:1810.12715"
    type: "prior theorem (T4)"
    prior_work: "IntervalBounds/ + ForMathlib IBP soundness."
  - title: "Beta-CROWN / CROWN"
    authors: ["Wang", "Zhang", "Xu", "et al."]
    id: "arXiv:2103.06624 / arXiv:1811.00866"
    type: "prior theorem (T5)"
    prior_work: "Verifier/ — sound/complete specification the card stands on."

