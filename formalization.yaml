# Edges to the empirical repo. Full tables + severities in ucla-formalization-edges.md.
# Listed here so the (future) MAGNET runner can surface which assumptions a card stands on.
edges:
  - id: dccnn-L-power-iter
    card: ta1/VeriStressGT/cards/evaluation.yaml
    construction: cnn.deep_contractive_cnn
    assumption:
      theorem: "T1' product-of-spectral-norms (needs UPPER bound on ∏‖Wᵢ‖₂) — NOW FORMALIZED (netLipschitz)"
      lean: VeriStressGT.LipschitzMargin.dccnn_robust_via_net_upper   # premise `‖φ‖₊·∏‖Wᵢ‖₊ ≤ Lhat` (the genuine product; audit F1)
      prose: prose/lipschitz-margin-certificate.md   # LM-1
    relaxation:
      code: ta1/VeriStressGT/src/VeriStressGT/robust_constructions/cnn/deep_contractive_cnn.py
      line: 64
      informal: "σ̂ from 20-step power iteration is a LOWER bound on ‖W‖₂; unsafe direction, bounded by 10% slack. See edges Appendix A."
    kind: numeric-estimate
    severity: high
  - id: poly-nbc-surrogate
    card: ta1/VeriStressGT/cards/evaluation.yaml
    construction: polynomial.algebraic_boundary
    assumption:
      theorem: "T6 exact distance-to-variety (ED degree, arXiv:2602.06105)"
      lean: VeriStressGT.AlgebraicBoundary.robust_of_numerical_lower_bound   # premise `distHat ≤ infDist`
      prose: prose/ed-degree-polynomial-verification.md   # ED-1
    relaxation:
      code: ta1/VeriStressGT/src/VeriStressGT/robust_constructions/polynomial/algebraic_boundary.py
      line: 405
      informal: "50-restart L-BFGS-B 'found no closer boundary point' — one-sided; could miss a nearer real critical point."
    kind: exact-to-local-search
    severity: high
  - id: milp-incomplete-label
    card: ta1/VeriStressGT/cards/evaluation.yaml
    construction: mlp_relu.milp.exact_radius
    assumption:
      theorem: "T3 label sound only if MILP OPTIMAL"
      lean: VeriStressGT.ExactMILP.label_sound_of_optimal   # premise `advDist = rStar`
      prose: prose/exact-milp-and-npcompleteness.md   # MILP-2
    relaxation:
      code: ta1/VeriStressGT/src/VeriStressGT/robust_constructions/mlp_relu/milp/exact_radius.py
      line: 714
      informal: "TIME_LIMIT ⇒ INCOMPLETE; code itself warns label 'NOT reliable'."
    kind: budget-drop
    severity: high
  - id: card-verifier-soundness
    card: ta1/VeriStressGT/cards/evaluation.yaml
    assumption:
      theorem: "T5 verifier soundness: UNSAT ⟹ robust"
      lean: VeriStressGT.Verifier.Sound
      prose: prose/crown-branch-and-bound.md   # CR-1
    relaxation:
      code: ta1/VeriStressGT/cards/evaluation.yaml
      line: 49
      informal: "Assumed, never checked — exactly what the paper finds violated by float-tolerance bugs."
    kind: assumed-soundness
    severity: high
  # --- added per audit F7 (previously in ucla-formalization-edges.md only) ---
  - id: milp-rmax-clamp
    card: ta1/VeriStressGT/cards/evaluation.yaml
    construction: mlp_relu.milp.exact_radius
    assumption:
      theorem: "T3 exact radius requires the MILP box to contain r* (not clamped at Rmax)"
      lean: VeriStressGT.ExactMILP.infDist_inter_closedBall_of_exists_mem_ball   # non-binding Rmax ⟹ infimum unchanged (audit F4b)
      prose: prose/exact-milp-and-npcompleteness.md   # MILP-1
    relaxation:
      code: ta1/VeriStressGT/src/VeriStressGT/robust_constructions/mlp_relu/milp/exact_radius.py
      line: 232
      informal: "Search clamped to t ≤ Rmax; if r* > Rmax the reported radius is a LOWER bound, not the true infDist."
    kind: regime-clamp
    severity: high
  - id: attn-fixed-pattern-gap
    card: ta1/VeriStressGT/cards/evaluation.yaml
    construction: attention.fixed_pattern
    assumption:
      theorem: "T2 softmax argmax pattern constant on the box"
      lean: VeriStressGT.SelfAttention.gap_iff_stability_margin   # the gap ⟺ δ_min > ε·C_max equivalence
      prose: prose/self-attention-lipschitz.md   # SA-3
    relaxation:
      code: ta1/VeriStressGT/src/VeriStressGT/robust_constructions/attention/fixed_pattern.py
      line: 82
      informal: "Coherence inequality 1−μ > 4ε√d+2ε²d checked at X₀ only, as a sufficient proxy for pattern-invariance."
    kind: proxy-condition
    severity: med
  # --- added per audit F2-C.3 (GUIDANCE-F2-F4b.md §F2-C.3): candidate soundness bug ---
  - id: attn-Lattn-n4-pooling
    card: ta1/VeriStressGT/cards/evaluation.yaml
    construction: attention.fixed_pattern
    status: "CONFIRMED code-vs-paper discrepancy (2026-07-10) — see FINDING-attn-Lattn-n4.md"
    assumption:
      theorem: "T2 aggregated L_attn = n/2 — paper arXiv:2605.17153 eq.52/54 AND the machine-checked bound"
      lean: VeriStressGT.SelfAttention.FixedPatternAttn.Z_deviation_n2   # ‖ΔZᵢ‖ ≤ (n/2)·B_S·ε·(Vmax+δV)+δV
      prose: prose/self-attention-lipschitz.md   # SA-2
      finding: FINDING-attn-Lattn-n4.md
    relaxation:
      code: ta1/VeriStressGT/src/VeriStressGT/robust_constructions/attention/fixed_pattern.py
      line: 66
      informal: >
        RESOLVED FROM PRIMARY SOURCES: the paper (arXiv:2605.17153 §A.6 eq.52/54) uses n/2, derived
        from the spectral ‖∇softmax‖_op ≤ 1/2, matching the machine-checked Z_deviation_n2. The
        shipped compute_L_attn uses n/4 on the ‖V0‖ and cross terms — the ENTRYWISE Jacobian bound
        maxₐ a(1−a)=1/4 mis-substituted for the spectral norm the ℓ² row-aggregation requires. So the
        code under-certifies L_attn by 2× vs its own paper — UNSAFE direction (smaller L_attn → easier
        cert → possible false-UNSAT ground-truth label when margin_slack < 2). Kim et al. (2006.04710,
        the cited source) provide NO n/4 and NO symmetric-halving; their bound is a different, tighter
        O(√N log N) result. Ask UCLA: is n/4 intentional (and if so what justifies the entrywise sub)?
    kind: code-vs-paper-bug
    severity: high
  - id: card-timeout-incomplete
    card: ta1/VeriStressGT/cards/evaluation.yaml
    assumption:
      theorem: "T5 β-CROWN complete only in the limit (no time bound)"
      lean: VeriStressGT.Verifier.CompleteInLimit   # completeness stated with no budget
      prose: prose/crown-branch-and-bound.md   # CR-2
    relaxation:
      code: ta1/VeriStressGT/cards/evaluation.yaml
      line: 69
      informal: "60 s timeout ⇒ incomplete; hard (high-unstable_frac) instances time out by design."
    kind: completeness-to-budget
    severity: med
